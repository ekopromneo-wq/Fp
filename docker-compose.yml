name: project

services:
  web:
    build:
      context: ./frontend
      # Dev server + bind mount below; the prod (static) stage is what
      # docker-compose.client.yml uses.
      target: dev
    ports:
      - '${WEB_PORT:-4173}:4173'
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:4000}
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build: ./backend
    ports:
      - '${PORT:-4000}:4000'
    environment:
      - PORT=4000
      - NODE_ENV=${NODE_ENV:-development}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:4000}
      # US-16.1 (ADR-027): OAuth-входы. Провайдер включается, только если заданы
      # его CLIENT_ID/SECRET. URL_* переопределяются лишь в тестах.
      - OAUTH_REDIRECT_BASE=${OAUTH_REDIRECT_BASE:-}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_GOOGLE_AUTH_URL=${OAUTH_GOOGLE_AUTH_URL:-}
      - OAUTH_GOOGLE_TOKEN_URL=${OAUTH_GOOGLE_TOKEN_URL:-}
      - OAUTH_GOOGLE_USERINFO_URL=${OAUTH_GOOGLE_USERINFO_URL:-}
      - OAUTH_YANDEX_CLIENT_ID=${OAUTH_YANDEX_CLIENT_ID:-}
      - OAUTH_YANDEX_CLIENT_SECRET=${OAUTH_YANDEX_CLIENT_SECRET:-}
      - OAUTH_VK_CLIENT_ID=${OAUTH_VK_CLIENT_ID:-}
      - OAUTH_VK_CLIENT_SECRET=${OAUTH_VK_CLIENT_SECRET:-}
      - OAUTH_SBER_CLIENT_ID=${OAUTH_SBER_CLIENT_ID:-}
      - OAUTH_SBER_CLIENT_SECRET=${OAUTH_SBER_CLIENT_SECRET:-}
      # US-16.5 (ADR-028): календарь Outlook/Microsoft 365. Включается, только если
      # заданы MS_OAUTH_CLIENT_ID/SECRET.
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_TENANT=${MS_OAUTH_TENANT:-common}
      - MS_OAUTH_AUTH_URL=${MS_OAUTH_AUTH_URL:-}
      - MS_OAUTH_TOKEN_URL=${MS_OAUTH_TOKEN_URL:-}
      - MS_GRAPH_BASE=${MS_GRAPH_BASE:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/voxmate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-voxmate-audio}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASR_MODEL=${OPENROUTER_ASR_MODEL:-openai/whisper-large-v3}
      - OPENROUTER_ASR_LANGUAGE=${OPENROUTER_ASR_LANGUAGE:-ru}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4o-mini}
      - RECORDING_JOB_ATTEMPTS=${RECORDING_JOB_ATTEMPTS:-3}
      - RECORDING_JOB_BACKOFF_MS=${RECORDING_JOB_BACKOFF_MS:-15000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Переопределяется в тестах (боевой Bot API не проверить без живого бота).
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-https://api.telegram.org}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
      - BITRIX_WEBHOOK_URL=${BITRIX_WEBHOOK_URL:-}
      - BITRIX_DEFAULT_RESPONSIBLE_ID=${BITRIX_DEFAULT_RESPONSIBLE_ID:-}
      - BITRIX_DEFAULT_GROUP_ID=${BITRIX_DEFAULT_GROUP_ID:-}
      - SPEECH2TEXT_API_KEY=${SPEECH2TEXT_API_KEY:-}
      # Расшифровку ведёт воркер, но API проверяет баланс сервисов на странице
      # настроек — ключ нужен и здесь.
      - SHOPOT_API_KEY=${SHOPOT_API_KEY:-}
      - RECORDER_BOT_URL=${RECORDER_BOT_URL:-http://recorder-bot:8100}
      - RECORDER_BOT_INTERNAL_SECRET=${RECORDER_BOT_INTERNAL_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: ./backend
    command: ["npm", "run", "worker"]
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/voxmate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-voxmate-audio}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASR_MODEL=${OPENROUTER_ASR_MODEL:-openai/whisper-large-v3}
      - OPENROUTER_ASR_LANGUAGE=${OPENROUTER_ASR_LANGUAGE:-ru}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4o-mini}
      - ASR_COMPRESS_THRESHOLD_BYTES=${ASR_COMPRESS_THRESHOLD_BYTES:-20971520}
      - ASR_COMPRESSED_BITRATE=${ASR_COMPRESSED_BITRATE:-32k}
      - ASR_MAX_RETRIES=${ASR_MAX_RETRIES:-3}
      - DIARIZER_URL=${DIARIZER_URL:-http://diarizer:8000}
      - SHOPOT_API_KEY=${SHOPOT_API_KEY:-}
      - SPEECH2TEXT_API_KEY=${SPEECH2TEXT_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Переопределяется в тестах (боевой Bot API не проверить без живого бота).
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-https://api.telegram.org}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_TENANT=${MS_OAUTH_TENANT:-common}
      - MS_OAUTH_TOKEN_URL=${MS_OAUTH_TOKEN_URL:-}
      - MS_GRAPH_BASE=${MS_GRAPH_BASE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  diarizer:
    build: ./diarizer
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - WHISPERX_MODEL=${WHISPERX_MODEL:-medium}
      - WHISPERX_LANGUAGE=${WHISPERX_LANGUAGE:-ru}
      - WHISPERX_DEVICE=${WHISPERX_DEVICE:-cpu}
      - WHISPERX_COMPUTE_TYPE=${WHISPERX_COMPUTE_TYPE:-int8}
    volumes:
      - diarizer-models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  recorder-bot:
    build: ./recorder-bot
    shm_size: '2gb'
    environment:
      - PORT=8100
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:4000}
      - RECORDER_BOT_INTERNAL_SECRET=${RECORDER_BOT_INTERNAL_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-voxmate}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voxmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "" ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  redis-data:
  minio-data:
  diarizer-models:
