<!DOCTYPE html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c4c42" />
    <meta name="description" content="VoxMate — запись встреч, расшифровка по спикерам, протокол и задачи. Работает офлайн." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VoxMate" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64.png" />
    <title>VoxMate PWA</title>
    <script>
      // Ловим beforeinstallprompt как можно раньше: Chrome может прислать его
      // до монтирования React, и тогда useEffect-подписчик его не застанет.
      // Прячем событие на window, хук установки его подхватит.
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        window.__deferredInstallPrompt = event;
        window.dispatchEvent(new Event('pwa-install-available'));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
