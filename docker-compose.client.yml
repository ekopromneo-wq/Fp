name: voxmate-client

services:
  web:
    build:
      context: ./frontend
      # Static production build (vite build + vite preview) - no dev server,
      # no source bind-mounts. VITE_* values are baked in at image build
      # time, so changing them requires `up -d --build`.
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://vox.ekoprom.org}
        VITE_DEMO_EMAIL: ${VITE_DEMO_EMAIL:-demo@voxmate.local}
        VITE_DEMO_PASSWORD: ${VITE_DEMO_PASSWORD:-voxmate123}
    ports:
      - '${WEB_PORT:-4173}:4173'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
