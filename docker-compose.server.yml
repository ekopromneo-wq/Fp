name: voxmate-server

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Готовый PWA-билд для защищённого паролем скачивания (see Caddyfile
      # /download). Каталог на сервере наполняется при деплое, вне git.
      - ./download:/srv/pwa:ro
      # Распакованный PWA для открытия/установки прямо с сервера за паролем
      # (see Caddyfile catch-all). Тоже наполняется при деплое, вне git.
      - ./app:/srv/app:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./backend
    command: ["npm", "start"]
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:4173}
      # Адрес, по которому открывается приложение: из него собираются ссылки на
      # результат (US-11.1). Без него ссылка соберётся из origin запроса, а он у
      # PWA и клиента-ноутбука разный.
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      # Закрытая регистрация: аккаунты только у администратора, вход по паролю
      # аккаунта служит защитой всего PWA (вместо Basic Auth на оболочке).
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/voxmate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-voxmate-audio}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASR_MODEL=${OPENROUTER_ASR_MODEL:-openai/whisper-large-v3}
      - OPENROUTER_ASR_LANGUAGE=${OPENROUTER_ASR_LANGUAGE:-ru}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4o-mini}
      - RECORDING_JOB_ATTEMPTS=${RECORDING_JOB_ATTEMPTS:-3}
      - RECORDING_JOB_BACKOFF_MS=${RECORDING_JOB_BACKOFF_MS:-15000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
      - BITRIX_WEBHOOK_URL=${BITRIX_WEBHOOK_URL:-}
      - BITRIX_DEFAULT_RESPONSIBLE_ID=${BITRIX_DEFAULT_RESPONSIBLE_ID:-}
      - BITRIX_DEFAULT_GROUP_ID=${BITRIX_DEFAULT_GROUP_ID:-}
      - SPEECH2TEXT_API_KEY=${SPEECH2TEXT_API_KEY:-}
      - RECORDER_BOT_URL=${RECORDER_BOT_URL:-http://recorder-bot:8100}
      - RECORDER_BOT_INTERNAL_SECRET=${RECORDER_BOT_INTERNAL_SECRET:-}
    volumes:
      # Chunked-upload staging must survive `up -d --build` (the standard
      # deploy step) - without this, resumable uploads in progress during a
      # deploy are lost and their sessions have to start over.
      - api-upload-staging:/app/data/upload-staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build: ./backend
    command: ["npm", "run", "worker"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/voxmate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-voxmate-audio}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASR_MODEL=${OPENROUTER_ASR_MODEL:-openai/whisper-large-v3}
      - OPENROUTER_ASR_LANGUAGE=${OPENROUTER_ASR_LANGUAGE:-ru}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4o-mini}
      - ASR_COMPRESS_THRESHOLD_BYTES=${ASR_COMPRESS_THRESHOLD_BYTES:-20971520}
      - ASR_COMPRESSED_BITRATE=${ASR_COMPRESSED_BITRATE:-32k}
      - ASR_MAX_RETRIES=${ASR_MAX_RETRIES:-3}
      - PIPELINE_CHUNK_SECONDS=${PIPELINE_CHUNK_SECONDS:-480}
      - PIPELINE_WHISPER_MODEL=${PIPELINE_WHISPER_MODEL:-openai/whisper-large-v3}
      - PIPELINE_VOICE_MODEL=${PIPELINE_VOICE_MODEL:-google/gemini-2.5-pro}
      - PIPELINE_IDENTITY_MODEL=${PIPELINE_IDENTITY_MODEL:-anthropic/claude-sonnet-5}
      - PIPELINE_WHISPER_CONCURRENCY=${PIPELINE_WHISPER_CONCURRENCY:-3}
      - SHOPOT_API_KEY=${SHOPOT_API_KEY:-}
      - SPEECH2TEXT_API_KEY=${SPEECH2TEXT_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  recorder-bot:
    build: ./recorder-bot
    shm_size: '1gb'
    environment:
      - PORT=8100
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:4000}
      - RECORDER_BOT_INTERNAL_SECRET=${RECORDER_BOT_INTERNAL_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-voxmate}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voxmate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "" ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  api-upload-staging:
  db-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
