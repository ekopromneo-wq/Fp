name: voxmate-server

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # –У–Њ—В–Њ–≤—Л–є PWA-–±–Є–ї–і –і–ї—П –Ј–∞—Й–Є—Й—С–љ–љ–Њ–≥–Њ –њ–∞—А–Њ–ї–µ–Љ —Б–Ї–∞—З–Є–≤–∞–љ–Є—П (see Caddyfile
      # /download). –Ъ–∞—В–∞–ї–Њ–≥ –љ–∞ —Б–µ—А–≤–µ—А–µ –љ–∞–њ–Њ–ї–љ—П–µ—В—Б—П –њ—А–Є –і–µ–њ–ї–Њ–µ, –≤–љ–µ git.
      - ./download:/srv/pwa:ro
      # –†–∞—Б–њ–∞–Ї–Њ–≤–∞–љ–љ—Л–є PWA –і–ї—П –Њ—В–Ї—А—Л—В–Є—П/—Г—Б—В–∞–љ–Њ–≤–Ї–Є –њ—А—П–Љ–Њ —Б —Б–µ—А–≤–µ—А–∞ –Ј–∞ –њ–∞—А–Њ–ї–µ–Љ
      # (see Caddyfile catch-all). –Ґ–Њ–ґ–µ –љ–∞–њ–Њ–ї–љ—П–µ—В—Б—П –њ—А–Є –і–µ–њ–ї–Њ–µ, –≤–љ–µ git.
      - ./app:/srv/app:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./backend
    command: ["npm", "start"]
    environment:
      - PORT=4000
      - NODE_ENV=production
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:4173}
      # –Р–і—А–µ—Б, –њ–Њ –Ї–Њ—В–Њ—А–Њ–Љ—Г –Њ—В–Ї—А—Л–≤–∞–µ—В—Б—П –њ—А–Є–ї–Њ–ґ–µ–љ–Є–µ: –Є–Ј –љ–µ–≥–Њ —Б–Њ–±–Є—А–∞—О—В—Б—П —Б—Б—Л–ї–Ї–Є –љ–∞
      # —А–µ–Ј—Г–ї—М—В–∞—В (US-11.1). –С–µ–Ј –љ–µ–≥–Њ —Б—Б—Л–ї–Ї–∞ —Б–Њ–±–µ—А—С—В—Б—П –Є–Ј origin –Ј–∞–њ—А–Њ—Б–∞, –∞ –Њ–љ —Г
      # PWA –Є –Ї–ї–Є–µ–љ—В–∞-–љ–Њ—Г—В–±—Г–Ї–∞ —А–∞–Ј–љ—Л–є.
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-}
      # US-16.1 (ADR-027): OAuth-–≤—Е–Њ–і—Л. –Я—А–Њ–≤–∞–є–і–µ—А –≤–Ї–ї—О—З–∞–µ—В—Б—П, —В–Њ–ї—М–Ї–Њ –µ—Б–ї–Є –Ј–∞–і–∞–љ—Л
      # –µ–≥–Њ CLIENT_ID/SECRET. URL_* –њ–µ—А–µ–Њ–њ—А–µ–і–µ–ї—П—О—В—Б—П –ї–Є—И—М –≤ —В–µ—Б—В–∞—Е.
      - OAUTH_REDIRECT_BASE=${OAUTH_REDIRECT_BASE:-}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_GOOGLE_AUTH_URL=${OAUTH_GOOGLE_AUTH_URL:-}
      - OAUTH_GOOGLE_TOKEN_URL=${OAUTH_GOOGLE_TOKEN_URL:-}
      - OAUTH_GOOGLE_USERINFO_URL=${OAUTH_GOOGLE_USERINFO_URL:-}
      - OAUTH_YANDEX_CLIENT_ID=${OAUTH_YANDEX_CLIENT_ID:-}
      - OAUTH_YANDEX_CLIENT_SECRET=${OAUTH_YANDEX_CLIENT_SECRET:-}
      - OAUTH_VK_CLIENT_ID=${OAUTH_VK_CLIENT_ID:-}
      - OAUTH_VK_CLIENT_SECRET=${OAUTH_VK_CLIENT_SECRET:-}
      - OAUTH_SBER_CLIENT_ID=${OAUTH_SBER_CLIENT_ID:-}
      - OAUTH_SBER_CLIENT_SECRET=${OAUTH_SBER_CLIENT_SECRET:-}
      # US-16.5 (ADR-028): –Ї–∞–ї–µ–љ–і–∞—А—М Outlook/Microsoft 365. –Т–Ї–ї—О—З–∞–µ—В—Б—П, —В–Њ–ї—М–Ї–Њ –µ—Б–ї–Є
      # –Ј–∞–і–∞–љ—Л MS_OAUTH_CLIENT_ID/SECRET.
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_TENANT=${MS_OAUTH_TENANT:-common}
      - MS_OAUTH_AUTH_URL=${MS_OAUTH_AUTH_URL:-}
      - MS_OAUTH_TOKEN_URL=${MS_OAUTH_TOKEN_URL:-}
      - MS_GRAPH_BASE=${MS_GRAPH_BASE:-}
      # –Ч–∞–Ї—А—Л—В–∞—П —А–µ–≥–Є—Б—В—А–∞—Ж–Є—П: –∞–Ї–Ї–∞—Г–љ—В—Л —В–Њ–ї—М–Ї–Њ —Г –∞–і–Љ–Є–љ–Є—Б—В—А–∞—В–Њ—А–∞, –≤—Е–Њ–і –њ–Њ –њ–∞—А–Њ–ї—О
      # –∞–Ї–Ї–∞—Г–љ—В–∞ —Б–ї—Г–ґ–Є—В –Ј–∞—Й–Є—В–Њ–є –≤—Б–µ–≥–Њ PWA (–≤–Љ–µ—Б—В–Њ Basic Auth –љ–∞ –Њ–±–Њ–ї–Њ—З–Ї–µ).
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/voxmate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-voxmate-audio}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASR_MODEL=${OPENROUTER_ASR_MODEL:-openai/whisper-large-v3}
      - OPENROUTER_ASR_LANGUAGE=${OPENROUTER_ASR_LANGUAGE:-ru}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4o-mini}
      - RECORDING_JOB_ATTEMPTS=${RECORDING_JOB_ATTEMPTS:-3}
      - RECORDING_JOB_BACKOFF_MS=${RECORDING_JOB_BACKOFF_MS:-15000}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # –Я–µ—А–µ–Њ–њ—А–µ–і–µ–ї—П–µ—В—Б—П –≤ —В–µ—Б—В–∞—Е (–±–Њ–µ–≤–Њ–є Bot API –љ–µ –њ—А–Њ–≤–µ—А–Є—В—М –±–µ–Ј –ґ–Є–≤–Њ–≥–Њ –±–Њ—В–∞).
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-https://api.telegram.org}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
      - BITRIX_WEBHOOK_URL=${BITRIX_WEBHOOK_URL:-}
      - BITRIX_DEFAULT_RESPONSIBLE_ID=${BITRIX_DEFAULT_RESPONSIBLE_ID:-}
      - BITRIX_DEFAULT_GROUP_ID=${BITRIX_DEFAULT_GROUP_ID:-}
      - SPEECH2TEXT_API_KEY=${SPEECH2TEXT_API_KEY:-}
      # –†–∞—Б—И–Є—Д—А–Њ–≤–Ї—Г –≤–µ–і—С—В –≤–Њ—А–Ї–µ—А, –љ–Њ API –њ—А–Њ–≤–µ—А—П–µ—В –±–∞–ї–∞–љ—Б —Б–µ—А–≤–Є—Б–Њ–≤ –љ–∞ —Б—В—А–∞–љ–Є—Ж–µ
      # –љ–∞—Б—В—А–Њ–µ–Ї вАФ –Ї–ї—О—З –љ—Г–ґ–µ–љ –Є –Ј–і–µ—Б—М.
      - SHOPOT_API_KEY=${SHOPOT_API_KEY:-}
      - RECORDER_BOT_URL=${RECORDER_BOT_URL:-http://recorder-bot:8100}
      - RECORDER_BOT_INTERNAL_SECRET=${RECORDER_BOT_INTERNAL_SECRET:-}
    volumes:
      # Chunked-upload staging must survive `up -d --build` (the standard
      # deploy step) - without this, resumable uploads in progress during a
      # deploy are lost and their sessions have to start over.
      - api-upload-staging:/app/data/upload-staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build: ./backend
    command: ["npm", "run", "worker"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@db:5432/voxmate}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-voxmate-audio}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_ASR_MODEL=${OPENROUTER_ASR_MODEL:-openai/whisper-large-v3}
      - OPENROUTER_ASR_LANGUAGE=${OPENROUTER_ASR_LANGUAGE:-ru}
      - OPENROUTER_LLM_MODEL=${OPENROUTER_LLM_MODEL:-openai/gpt-4o-mini}
      - ASR_COMPRESS_THRESHOLD_BYTES=${ASR_COMPRESS_THRESHOLD_BYTES:-20971520}
      - ASR_COMPRESSED_BITRATE=${ASR_COMPRESSED_BITRATE:-32k}
      - ASR_MAX_RETRIES=${ASR_MAX_RETRIES:-3}
      - PIPELINE_CHUNK_SECONDS=${PIPELINE_CHUNK_SECONDS:-480}
      - PIPELINE_WHISPER_MODEL=${PIPELINE_WHISPER_MODEL:-openai/whisper-large-v3}
      - PIPELINE_VOICE_MODEL=${PIPELINE_VOICE_MODEL:-google/gemini-2.5-pro}
      - PIPELINE_IDENTITY_MODEL=${PIPELINE_IDENTITY_MODEL:-anthropic/claude-sonnet-5}
      - PIPELINE_WHISPER_CONCURRENCY=${PIPELINE_WHISPER_CONCURRENCY:-3}
      - SHOPOT_API_KEY=${SHOPOT_API_KEY:-}
      - SPEECH2TEXT_API_KEY=${SPEECH2TEXT_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # –Я–µ—А–µ–Њ–њ—А–µ–і–µ–ї—П–µ—В—Б—П –≤ —В–µ—Б—В–∞—Е (–±–Њ–µ–≤–Њ–є Bot API –љ–µ –њ—А–Њ–≤–µ—А–Є—В—М –±–µ–Ј –ґ–Є–≤–Њ–≥–Њ –±–Њ—В–∞).
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-https://api.telegram.org}
      - TELEGRAM_DEFAULT_CHAT_ID=${TELEGRAM_DEFAULT_CHAT_ID:-}
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_TENANT=${MS_OAUTH_TENANT:-common}
      - MS_OAUTH_TOKEN_URL=${MS_OAUTH_TOKEN_URL:-}
      - MS_GRAPH_BASE=${MS_GRAPH_BASE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  recorder-bot:
    build: ./recorder-bot
    shm_size: '1gb'
    environment:
      - PORT=8100
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://api:4000}
      - RECORDER_BOT_INTERNAL_SECRET=${RECORDER_BOT_INTERNAL_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8100/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-voxmate}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voxmate"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "" ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  api-upload-staging:
  db-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
